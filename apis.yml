aid: nokia-corp
name: Nokia
description: >-
  Nokia (Nokia Oyj) is a Finnish multinational telecommunications, information
  technology, and consumer electronics corporation headquartered in Espoo,
  Finland. Nokia is a leading vendor of carrier-grade network equipment for
  communication service providers (CSPs), webscalers, and enterprises across
  mobile (5G/6G RAN, Core), fixed (broadband, fiber), IP (Service Router OS /
  SR Linux), optical (WaveSuite, 1830 PSS/PSI), submarine cable, and cloud and
  network services. Nokia's developer surface spans (1) the Network Services
  Platform (NSP) automation suite, (2) the SR OS / SR Linux network operating
  systems with the pySROS SDK and YANG models for the 7x50 platform, (3)
  WaveSuite optical management REST APIs with Swagger documentation, (4) the
  CAMARA-compliant Network as Code platform exposing 16+ standardized network
  APIs (Quality on Demand, Device Location, SIM Swap, Number Verification, KYC,
  Geofencing, Slicing) for B2B and B2C developer consumption, and (5) the
  Network Exposure Platform that enables operators to expose their own network
  capabilities to developers. Nokia also operates Nokia Technologies (licensing),
  the Bell Labs research division, and a broad open-source presence (600+ GitHub
  repos) including TTCN-3 tooling (ntt), Corteca CLI, Moler test framework, and
  YANG models.
