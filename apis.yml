apis:
  - aid: nokia-corp:network-as-code
    name: Nokia Network as Code Platform
    description: >-
      CAMARA-compliant, production-ready Network APIs exposing 5G core and RAN
      functions through standardized northbound interfaces. Includes Quality on
      Demand, Device Location (Verification, Retrieval), Geofencing,
      Specialized Networks (Slicing), Device Status (Roaming, Reachability),
      Congestion Insights, SIM Swap, Number Verification, Call Forwarding
      Signal, Device Swap, and KYC (Match, Age Verification, Tenure, Fill-in).
      Aligned to CAMARA, TM Forum, and GSMA Open Gateway. Available on Google
      Cloud Marketplace.
    tags:
      - Network as Code
      - CAMARA
      - Quality on Demand
      - Device Location
      - SIM Swap
      - KYC
      - 5G
      - Open Gateway
    humanURL: https://networkascode.nokia.io/
    properties:
      - url: https://networkascode.nokia.io/
        type: Portal
      - url: https://networkascode.nokia.io/docs/api-reference
        type: Documentation
      - url: https://www.nokia.com/programmable-networks/network-as-code/
        type: Documentation
  - aid: nokia-corp:network-services-platform
    name: Nokia Network Services Platform (NSP) API
    description: >-
      REST-based automation and assurance API for Nokia's multilayer (IP +
      optical) Network Services Platform. Provides programmable model-driven
      service orchestration, inventory, fault, performance, and intent-based
      automation across multivendor networks. Includes API Reference and
      Artifact Development tooling on the Nokia Network Developer Portal.
    tags:
      - NSP
      - Network Automation
      - Service Orchestration
      - Multilayer
      - IP
      - Optical
    humanURL: https://network.developer.nokia.com/
    properties:
      - url: https://network.developer.nokia.com/
        type: Portal
      - url: https://network.developer.nokia.com/
        type: Documentation
  - aid: nokia-corp:sr-os-pysros
    name: Nokia SR OS pySROS SDK and YANG Models
    description: >-
      pySROS is the official Python SDK for model-driven configuration,
      operational data retrieval, and automation against Nokia SR OS devices
      (7x50 SR/IXR/XRS/MG and family). Backed by the public 7x50_YangModels
      repository providing canonical YANG data models for NETCONF / RESTCONF /
      gNMI consumption.
    tags:
      - SR OS
      - 7x50
      - YANG
      - Python
      - SDK
      - NETCONF
      - gNMI
      - Network Automation
    humanURL: https://github.com/nokia/pysros
    properties:
      - url: https://github.com/nokia/pysros
        type: GitHubRepository
      - url: https://github.com/nokia/7x50_YangModels
        type: GitHubRepository
      - url: https://network.developer.nokia.com/
        type: Documentation
  - aid: nokia-corp:sr-linux
    name: Nokia SR Linux
    description: >-
      Modern, Linux-based, fully model-driven network operating system for
      data-center and service-provider routing. SR Linux exposes a gNMI / gNOI
      management surface, a NETCONF interface, and an extensible application
      framework, with YANG as the canonical configuration and state contract.
    tags:
      - SR Linux
      - NOS
      - Data Center
      - gNMI
      - gNOI
      - NETCONF
      - YANG
      - Network Automation
    humanURL: https://www.nokia.com/ip-networks/service-router-linux-NOS/
    properties:
      - url: https://www.nokia.com/ip-networks/service-router-linux-NOS/
        type: Portal
      - url: https://learn.srlinux.dev/
        type: Documentation
  - aid: nokia-corp:wavesuite
    name: Nokia WaveSuite Optical REST APIs
    description: >-
      Optical networking REST APIs (Swagger-documented) across the WaveSuite
      portfolio — WaveSuite-NOC, WaveSuite Resource Control, WaveSuite
      Optimizer, Planner, Service Enablement, and Health & Analytics — plus
      the NE Management Interface for the 1830 optical platforms.
    tags:
      - Optical
      - WaveSuite
      - 1830
      - Service Enablement
      - Network Operations
    humanURL: https://network.developer.nokia.com/
    properties:
      - url: https://network.developer.nokia.com/
        type: Portal
      - url: https://network.developer.nokia.com/
        type: Documentation
  - aid: nokia-corp:network-exposure-platform
    name: Nokia Network Exposure Platform
    description: >-
      Operator-facing platform that enables CSPs to expose their own network
      capabilities as standardized CAMARA / GSMA Open Gateway APIs to
      developers and aggregators. Sits beneath Network as Code and provides
      API lifecycle, monetization, and consent management for service provider
      API programs.
    tags:
      - Network Exposure
      - CAMARA
      - GSMA Open Gateway
      - API Management
      - Monetization
      - CSP
    humanURL: https://www.nokia.com/about-us/news/releases/
    properties:
      - url: https://www.nokia.com/programmable-networks/network-as-code/
        type: Documentation
